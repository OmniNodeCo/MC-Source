name: Download JAR to Repo

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct download URL to the JAR'
        required: true
        type: string
      folder:
        description: 'Folder to save to (e.g. jars/alpha or custom/path)'
        required: true
        type: string
      filename:
        description: 'Filename to save as (e.g. rd-132211.jar)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create folder if missing
        run: |
          mkdir -p "${{ inputs.folder }}"

      - name: Download JAR
        run: |
          wget -O "${{ inputs.folder }}/${{ inputs.filename }}" "${{ inputs.download_url }}"

      - name: Verify download
        run: |
          FILE="${{ inputs.folder }}/${{ inputs.filename }}"
          if [ ! -f "$FILE" ]; then
            echo "Download failed: $FILE not found"
            exit 1
          fi
          
          SIZE=$(stat -c%s "$FILE")
          echo "Downloaded: $FILE ($SIZE bytes)"
          
          if [ "$SIZE" -lt 1000 ]; then
            echo "Warning: File is very small. It may not be a valid JAR."
            cat "$FILE"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "${{ inputs.folder }}/${{ inputs.filename }}"
          
          if git diff --cached --quiet; then
            echo "File already exists and is identical. Nothing to commit."
          else
            git commit -m "Add ${{ inputs.filename }} to ${{ inputs.folder }}"
            git push
            echo "Successfully uploaded ${{ inputs.filename }} to ${{ inputs.folder }}"
          fi