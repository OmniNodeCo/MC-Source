name: Download JAR to Repo

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct download URL to the JAR'
        required: true
        type: string
      folder:
        description: 'Folder to save to'
        required: true
        type: choice
        options:
          - jars/alpha
          - jars/beta
          - jars/snapshots
          - jars/releases
      filename:
        description: 'Filename to save as (e.g. rd-132211.jar)'
        required: true
        type: string
      auto_decompile:
        description: 'Automatically trigger decompile after upload?'
        required: true
        type: boolean
        default: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create folder if missing
        run: |
          mkdir -p "${{ inputs.folder }}"

      - name: Download JAR
        run: |
          wget -O "${{ inputs.folder }}/${{ inputs.filename }}" "${{ inputs.download_url }}"

      - name: Verify download
        run: |
          FILE="${{ inputs.folder }}/${{ inputs.filename }}"
          if [ ! -f "$FILE" ]; then
            echo "Download failed: $FILE not found"
            exit 1
          fi
          
          SIZE=$(stat -c%s "$FILE")
          echo "Downloaded: $FILE ($SIZE bytes)"
          
          if [ "$SIZE" -lt 1000 ]; then
            echo "Warning: File is very small. May not be valid."
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "${{ inputs.folder }}/${{ inputs.filename }}"
          
          if git diff --cached --quiet; then
            echo "File already exists. Nothing to commit."
          else
            git commit -m "Add ${{ inputs.filename }} to ${{ inputs.folder }}"
            git push
          fi

  decompile:
    needs: download
    if: ${{ inputs.auto_decompile == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set variables
        run: |
          FOLDER="${{ inputs.folder }}"
          FILENAME="${{ inputs.filename }}"
          JAR_PATH="$FOLDER/$FILENAME"
          JAR_NAME=$(basename "$FILENAME" .jar)
          JAR_TYPE=$(echo "$FOLDER" | cut -d'/' -f2)
          
          echo "JAR_FILE=$JAR_PATH" >> "$GITHUB_ENV"
          echo "JAR_NAME=$JAR_NAME" >> "$GITHUB_ENV"
          echo "JAR_TYPE=$JAR_TYPE" >> "$GITHUB_ENV"

      - name: Set Release Label
        run: |
          case "${{ env.JAR_TYPE }}" in
            alpha)     echo "RELEASE_LABEL=Alpha" >> "$GITHUB_ENV" ;;
            beta)      echo "RELEASE_LABEL=Beta" >> "$GITHUB_ENV" ;;
            snapshots) echo "RELEASE_LABEL=Snapshot" >> "$GITHUB_ENV" ;;
            releases)  echo "RELEASE_LABEL=Release" >> "$GITHUB_ENV" ;;
            *)         echo "RELEASE_LABEL=Minecraft" >> "$GITHUB_ENV" ;;
          esac

      - name: Download Vineflower
        env:
          VINEFLOWER_VERSION: 1.12.0
        run: |
          wget -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/${VINEFLOWER_VERSION}/vineflower-${VINEFLOWER_VERSION}.jar"

      - name: Decompile JAR
        run: |
          mkdir -p output_src
          java -jar vineflower.jar \
            -j=2 \
            -e=1 \
            -dgs=1 \
            -asc=1 \
            -ind="    " \
            "${{ env.JAR_FILE }}" \
            output_src/

      - name: Zip Source Code
        run: |
          cd output_src
          zip -r "../${{ env.JAR_NAME }}-source.zip" .
          cd ..

      - name: Copy JAR for release
        run: |
          cp "${{ env.JAR_FILE }}" "${{ env.JAR_NAME }}.jar"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.RELEASE_LABEL }}] ${{ env.JAR_NAME }}"
          body: |
            ## Minecraft `${{ env.JAR_NAME }}` (${{ env.RELEASE_LABEL }})
            
            ### Downloads
            | File | Description |
            |------|-------------|
            | `${{ env.JAR_NAME }}-source.zip` | Decompiled Java source code |
            | `${{ env.JAR_NAME }}.jar` | Original client JAR |
            
            ### Info
            - **Classification:** ${{ env.RELEASE_LABEL }}
            - **Decompiler:** Vineflower
          files: |
            ${{ env.JAR_NAME }}-source.zip
            ${{ env.JAR_NAME }}.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}