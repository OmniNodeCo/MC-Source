# ════════════════════════════════════════════════
# BATCH: PARSE & SORT BY MOJANG ORDER
# ════════════════════════════════════════════════
  batch-parse:
    name: "📋 Parse & Sort (Oldest → Newest)"
    needs: setup
    if: ${{ inputs.mode == '📋 Batch Release (from link file)' }}
    runs-on: ubuntu-latest
    outputs:
      entries: ${{ steps.parse.outputs.entries }}
      count: ${{ steps.parse.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull

      - name: Parse and sort by Mojang version order
        id: parse
        run: |
          FILE="links/${{ inputs.batch_file }}"

          if [ ! -f "$FILE" ]; then
            echo "❌ File not found: $FILE"
            ls links/*.md 2>/dev/null || echo "  None"
            exit 1
          fi

          echo "📄 Reading: $FILE"

          # Determine section from filename
          case "${{ inputs.batch_file }}" in
            links_releases.md)  SECTION="releases" ;;
            links_snapshots.md) SECTION="snapshots" ;;
            links_beta.md)      SECTION="beta" ;;
            links_alpha.md)     SECTION="alpha" ;;
            *)                  SECTION="custom" ;;
          esac

          JAR_TYPE="${{ inputs.batch_jar_type }}"
          LIMIT="${{ inputs.batch_limit }}"

          # ── STEP 1: Parse link file into unsorted list ──
          VERSION=""
          CLIENT=""
          SERVER=""
          > unsorted_entries.txt

          save_version() {
            if [ -n "$VERSION" ]; then
              if { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "client" ]; } && [ -n "$CLIENT" ]; then
                echo "${VERSION}|${CLIENT}|${SECTION}|client" >> unsorted_entries.txt
              fi
              if { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "server" ]; } && [ -n "$SERVER" ]; then
                echo "${VERSION}|${SERVER}|${SECTION}|server" >> unsorted_entries.txt
              fi
            fi
          }

          while IFS= read -r line || [ -n "$line" ]; do
            if echo "$line" | grep -qE '^### '; then
              save_version
              VERSION=$(echo "$line" | sed 's/^### //')
              CLIENT=""
              SERVER=""
              continue
            fi
            if echo "$line" | grep -qiE '^\- *[Cc]lient'; then
              CLIENT=$(echo "$line" | grep -oP 'https?://[^\s\)]+')
              continue
            fi
            if echo "$line" | grep -qiE '^\- *[Ss]erver'; then
              SERVER=$(echo "$line" | grep -oP 'https?://[^\s\)]+')
              continue
            fi
          done < "$FILE"
          save_version

          TOTAL_UNSORTED=$(wc -l < unsorted_entries.txt)
          echo "📋 Found $TOTAL_UNSORTED entries (unsorted)"

          if [ "$TOTAL_UNSORTED" -eq 0 ]; then
            echo "⚠️ No entries found"
            echo "entries=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── STEP 2: Get Mojang version order ──
          echo "📥 Fetching Mojang manifest..."
          curl -s "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json" > mojang_manifest.json

          # Mojang is newest first — reverse to get oldest first
          jq -r '.versions | reverse | .[].id' mojang_manifest.json > mojang_order.txt

          # ── STEP 3: Sort entries by Mojang order (oldest first) ──
          > sorted_entries.txt
          COUNT=0

          while IFS= read -r mc_version; do
            while IFS='|' read -r ver url sec typ; do
              if [ "$ver" = "$mc_version" ]; then
                if [ "$LIMIT" -eq 0 ] || [ "$COUNT" -lt "$LIMIT" ]; then
                  echo "${ver}|${url}|${sec}|${typ}" >> sorted_entries.txt
                  COUNT=$((COUNT + 1))
                fi
              fi
            done < unsorted_entries.txt
          done < mojang_order.txt

          # Add any versions not in Mojang manifest at the end
          while IFS='|' read -r ver url sec typ; do
            if ! grep -q "^${ver}|" sorted_entries.txt 2>/dev/null; then
              if [ "$LIMIT" -eq 0 ] || [ "$COUNT" -lt "$LIMIT" ]; then
                echo "${ver}|${url}|${sec}|${typ}" >> sorted_entries.txt
                COUNT=$((COUNT + 1))
              fi
            fi
          done < unsorted_entries.txt

          TOTAL_SORTED=$(wc -l < sorted_entries.txt)

          echo ""
          echo "═══════════════════════════════════════════"
          echo "📋 PROCESSING ORDER (oldest → newest)"
          echo "═══════════════════════════════════════════"
          echo ""

          IDX=0
          while IFS='|' read -r ver url sec typ; do
            IDX=$((IDX + 1))
            echo "  $IDX. $ver ($typ)"
          done < sorted_entries.txt

          echo ""
          echo "Total: $TOTAL_SORTED entries"
          echo ""
          echo "⚡ Will process oldest first → newest last"
          echo "📌 Newest will appear on top in GitHub Releases"

          # ── STEP 4: Convert to JSON array ──
          ENTRIES="[]"
          IDX=0
          while IFS='|' read -r ver url sec typ; do
            IDX=$((IDX + 1))
            ENTRIES=$(echo "$ENTRIES" | jq \
              --arg v "$ver" \
              --arg u "$url" \
              --arg s "$sec" \
              --arg t "$typ" \
              --argjson i "$IDX" \
              '. += [{"version": $v, "url": $u, "section": $s, "type": $t, "index": $i}]')
          done < sorted_entries.txt

          echo "entries=$(echo "$ENTRIES" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "count=$TOTAL_SORTED" >> "$GITHUB_OUTPUT"

# ════════════════════════════════════════════════
# BATCH: PROCESS ONE BY ONE IN ORDER
# ════════════════════════════════════════════════
  batch-process:
    name: "⚙️ Process All Versions"
    needs: batch-parse
    if: ${{ needs.batch-parse.outputs.count != '0' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Vineflower
        run: wget -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"

      - name: Process all versions in order
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENTRIES: ${{ needs.batch-parse.outputs.entries }}
        run: |
          echo "$ENTRIES" > entries.json

          TOTAL=$(jq 'length' entries.json)

          echo ""
          echo "═══════════════════════════════════════════"
          echo "⚙️ PROCESSING $TOTAL VERSIONS (oldest → newest)"
          echo "═══════════════════════════════════════════"
          echo ""

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for (( i=0; i<$TOTAL; i++ )); do
            ENTRY=$(jq ".[$i]" entries.json)

            VERSION=$(echo "$ENTRY" | jq -r '.version')
            URL=$(echo "$ENTRY" | jq -r '.url')
            SECTION=$(echo "$ENTRY" | jq -r '.section')
            TYPE=$(echo "$ENTRY" | jq -r '.type')
            INDEX=$(echo "$ENTRY" | jq -r '.index')

            JAR_NAME="${VERSION}-${TYPE}"
            FILENAME="${VERSION}-${TYPE}.jar"
            JAR_FILE="jars/${SECTION}/${FILENAME}"
            TAG="${SECTION}-${JAR_NAME}"

            echo ""
            echo "────────────────────────────────────────"
            echo "[$INDEX/$TOTAL] $VERSION ($TYPE)"
            echo "────────────────────────────────────────"

            # Check if release exists
            if gh release view "$TAG" > /dev/null 2>&1; then
              echo "  ⏭️ Skipping — release exists"
              continue
            fi

            # Download JAR
            echo "  📥 Downloading..."
            mkdir -p "jars/${SECTION}"
            wget -q -O "$JAR_FILE" "$URL"

            SIZE=$(stat -c%s "$JAR_FILE")
            echo "  ✅ Downloaded: $SIZE bytes"

            if [ "$SIZE" -lt 1000 ]; then
              echo "  ❌ File too small, skipping"
              rm -f "$JAR_FILE"
              continue
            fi

            # Commit JAR
            echo "  💾 Committing JAR..."
            git pull --rebase || true
            git add "$JAR_FILE"
            git diff --cached --quiet || git commit -m "Add $FILENAME"
            git push || true

            # Decompile
            echo "  🔧 Decompiling..."
            rm -rf output_src
            mkdir -p output_src
            java -jar vineflower.jar -j=2 -e=1 -dgs=1 -asc=1 -ind="    " "$JAR_FILE" output_src/ 2>/dev/null || true

            # Analyze
            TOTAL_FILES=$(find output_src -type f | wc -l)
            JAVA_FILES=$(find output_src -name "*.java" | wc -l)
            JSON_FILES=$(find output_src \( -name "*.json" -o -name "*.mcmeta" \) | wc -l)
            PNG_FILES=$(find output_src -name "*.png" | wc -l)
            OGG_FILES=$(find output_src -name "*.ogg" | wc -l)
            OTHER_FILES=$((TOTAL_FILES - JAVA_FILES - JSON_FILES - PNG_FILES - OGG_FILES))

            STATS="| Type | Files | % |
          |------|-------|---|"
            for PAIR in "Java:$JAVA_FILES" "JSON:$JSON_FILES" "PNG:$PNG_FILES" "OGG:$OGG_FILES" "Other:$OTHER_FILES"; do
              NAME="${PAIR%%:*}"; NUM="${PAIR##*:}"
              if [ "$NUM" -gt 0 ] && [ "$TOTAL_FILES" -gt 0 ]; then
                PCT=$(awk "BEGIN {printf \"%.1f\", ($NUM/$TOTAL_FILES)*100}")
                STATS="$STATS
          | $NAME | $NUM | $PCT% |"
              fi
            done
            STATS="$STATS

          **Total:** $TOTAL_FILES files"

            # Set label
            case "$SECTION" in
              alpha)     LABEL="Alpha" ;;
              beta)      LABEL="Beta" ;;
              snapshots) LABEL="Snapshot" ;;
              releases)  LABEL="Release" ;;
              *)         LABEL="Minecraft" ;;
            esac

            # Package
            echo "  📦 Packaging..."
            cd output_src && zip -qr "../${JAR_NAME}-source.zip" . && cd ..
            cp "$JAR_FILE" "${JAR_NAME}.jar"

            # Create release
            echo "  🚀 Creating release..."

            BODY="## Minecraft \`$VERSION\` — $TYPE ($LABEL)

          ### 📥 Downloads
          | File | Description |
          |------|-------------|
          | \`${JAR_NAME}-source.zip\` | Decompiled Java source |
          | \`${JAR_NAME}.jar\` | Original $TYPE JAR |

          ### 📊 File Breakdown
          $STATS

          ### ℹ️ Info
          - **Version:** $VERSION
          - **Type:** $TYPE
          - **Classification:** $LABEL
          - **Decompiler:** Vineflower 1.12.0"

            gh release create "$TAG" \
              --title "[$LABEL] $VERSION ($TYPE)" \
              --notes "$BODY" \
              "${JAR_NAME}-source.zip" \
              "${JAR_NAME}.jar"

            echo "  ✅ Released!"

            # Cleanup
            rm -rf output_src "${JAR_NAME}-source.zip" "${JAR_NAME}.jar"

            # Small delay to ensure proper ordering
            sleep 2

          done

          echo ""
          echo "═══════════════════════════════════════════"
          echo "✅ DONE! All versions processed"
          echo ""
          echo "📌 Releases are now ordered: newest on top"
          echo "═══════════════════════════════════════════"
