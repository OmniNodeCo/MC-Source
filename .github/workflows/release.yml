name: Decompile and Release

on:
  push:
    paths:
      - 'jars/alpha/*.jar'
      - 'jars/beta/*.jar'
      - 'jars/snapshots/*.jar'
      - 'jars/releases/*.jar'
  workflow_dispatch:
    inputs:
      jar_folder:
        description: 'Folder the JAR is in'
        required: true
        type: choice
        options:
          - alpha
          - beta
          - snapshots
          - releases
      jar_file:
        description: 'JAR filename (example: b1.7.3.jar)'
        required: true
        type: string
      changelog_url:
        description: 'Changelog URL (optional)'
        required: false
        type: string
        default: ''

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ensure folders exist
        run: |
          mkdir -p jars/alpha jars/beta jars/snapshots jars/releases

      - name: Detect JAR
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FOLDER="${{ inputs.jar_folder }}"
            JAR_FILENAME="${{ inputs.jar_file }}"
            CHANGED_JAR="jars/$FOLDER/$JAR_FILENAME"
          else
            CHANGED_JAR=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -E '^jars/(alpha|beta|snapshots|releases)/.*\.jar$' | head -n 1)

            if [ -z "$CHANGED_JAR" ]; then
              CHANGED_JAR=$(find jars -name "*.jar" -printf "%T@ %p\n" | sort -n | tail -1 | cut -d' ' -f2-)
            fi

            FOLDER=$(echo "$CHANGED_JAR" | cut -d'/' -f2)
          fi

          JAR_NAME=$(basename "$CHANGED_JAR" .jar)

          echo "JAR_FILE=$CHANGED_JAR" >> "$GITHUB_ENV"
          echo "JAR_NAME=$JAR_NAME" >> "$GITHUB_ENV"
          echo "JAR_TYPE=$FOLDER" >> "$GITHUB_ENV"

      - name: Validate JAR exists
        run: |
          if [ ! -f "${{ env.JAR_FILE }}" ]; then
            echo "JAR not found: ${{ env.JAR_FILE }}"
            exit 1
          fi

      - name: Set Release Label
        run: |
          case "${{ env.JAR_TYPE }}" in
            alpha)     echo "RELEASE_LABEL=Alpha" >> "$GITHUB_ENV" ;;
            beta)      echo "RELEASE_LABEL=Beta" >> "$GITHUB_ENV" ;;
            snapshots) echo "RELEASE_LABEL=Snapshot" >> "$GITHUB_ENV" ;;
            releases)  echo "RELEASE_LABEL=Release" >> "$GITHUB_ENV" ;;
            *)         echo "RELEASE_LABEL=Minecraft" >> "$GITHUB_ENV" ;;
          esac

      - name: Set Changelog
        run: |
          CHANGELOG_URL="${{ inputs.changelog_url }}"
          if [ -n "$CHANGELOG_URL" ]; then
            echo "CHANGELOG_LINE=- **Changelog:** [View Changelog]($CHANGELOG_URL)" >> "$GITHUB_ENV"
          else
            echo "CHANGELOG_LINE=" >> "$GITHUB_ENV"
          fi

      - name: Download Vineflower
        env:
          VINEFLOWER_VERSION: 1.12.0
        run: |
          wget -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/${VINEFLOWER_VERSION}/vineflower-${VINEFLOWER_VERSION}.jar"

      - name: Decompile JAR
        run: |
          mkdir -p output_src
          java -jar vineflower.jar \
            -j=2 \
            -e=1 \
            -dgs=1 \
            -asc=1 \
            -ind="    " \
            "${{ env.JAR_FILE }}" \
            output_src/

      - name: Zip Source Code
        run: |
          cd output_src
          zip -r "../${{ env.JAR_NAME }}-source.zip" .
          cd ..

      - name: Copy JAR for release
        run: |
          cp "${{ env.JAR_FILE }}" "${{ env.JAR_NAME }}.jar"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.RELEASE_LABEL }}] ${{ env.JAR_NAME }}"
          body: |
            ## Minecraft `${{ env.JAR_NAME }}` (${{ env.RELEASE_LABEL }})
            
            ### Downloads
            | File | Description |
            |------|-------------|
            | `${{ env.JAR_NAME }}-source.zip` | Decompiled Java source code |
            | `${{ env.JAR_NAME }}.jar` | Original client JAR |
            
            ### Info
            - **Classification:** ${{ env.RELEASE_LABEL }}
            - **Decompiler:** Vineflower
            ${{ env.CHANGELOG_LINE }}
          files: |
            ${{ env.JAR_NAME }}-source.zip
            ${{ env.JAR_NAME }}.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}