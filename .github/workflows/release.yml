name: рҹ“Ұ Minecraft Source Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'рҹ”§ Mode'
        required: true
        type: choice
        options:
          - 'рҹ“Ҙ Download & Release (from URL)'
          - 'рҹ“Ӯ Release Existing JAR (from repo)'
          - 'рҹ“Ӣ Batch Release (from link file)'

      # в”Җв”Җ SINGLE MODE OPTIONS в”Җв”Җ
      single_url:
        description: 'рҹ”— [Single] Download URL'
        required: false
        type: string
        default: ''
      single_folder:
        description: 'рҹ“Ғ [Single] Category'
        required: false
        type: choice
        options:
          - releases
          - snapshots
          - beta
          - alpha
      single_version:
        description: 'рҹҸ·пёҸ [Single] Version Name (e.g. 26.2)'
        required: false
        type: string
        default: ''
      single_jar_type:
        description: 'вҳ• [Single] JAR Type'
        required: false
        type: choice
        options:
          - client
          - server
      single_changelog:
        description: 'рҹ“қ [Single] Changelog URL (optional)'
        required: false
        type: string
        default: ''

      # в”Җв”Җ BATCH MODE OPTIONS в”Җв”Җ
      batch_file:
        description: 'рҹ“„ [Batch] Link File'
        required: false
        type: choice
        options:
          - links_releases.md
          - links_snapshots.md
          - links_beta.md
          - links_alpha.md
          - links_custom.md
      batch_jar_type:
        description: 'вҳ• [Batch] JAR Type'
        required: false
        type: choice
        options:
          - both
          - client
          - server
      batch_limit:
        description: 'рҹ”ў [Batch] Max Versions (0 = all)'
        required: false
        type: number
        default: 0

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# SETUP
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
jobs:
  setup:
    name: "рҹ”§ Setup"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create manifest if missing
        run: |
          if [ ! -f "manifest.json" ]; then
            cat > "manifest.json" << 'EOF'
          {
            "project": "MC-Source",
            "description": "Decompiled Minecraft Source Code",
            "decompiler": "Vineflower 1.12.0",
            "processed": []
          }
          EOF
          fi

      - name: Ensure folders exist
        run: |
          mkdir -p jars/alpha jars/beta jars/snapshots jars/releases links
          for DIR in jars/alpha jars/beta jars/snapshots jars/releases links; do
            [ "$(ls -A $DIR 2>/dev/null)" ] || touch "$DIR/.gitkeep"
          done

      - name: Commit setup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "рҹ”§ Setup"
          git push || true

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# SINGLE: DOWNLOAD & RELEASE
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  single-download:
    name: "рҹ“Ҙ Download & Release"
    needs: setup
    if: ${{ inputs.mode == 'рҹ“Ҙ Download & Release (from URL)' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate inputs
        run: |
          [ -z "${{ inputs.single_url }}" ] && echo "вқҢ No URL" && exit 1
          [ -z "${{ inputs.single_version }}" ] && echo "вқҢ No version" && exit 1

      - name: Setup variables
        run: |
          VERSION=$(echo "${{ inputs.single_version }}" | sed 's/\.jar$//')
          TYPE="${{ inputs.single_jar_type }}"
          FOLDER="${{ inputs.single_folder }}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CONTENT_TYPE=$TYPE" >> "$GITHUB_ENV"
          echo "JAR_TYPE=$FOLDER" >> "$GITHUB_ENV"
          echo "JAR_NAME=${VERSION}-${TYPE}" >> "$GITHUB_ENV"
          echo "FILENAME=${VERSION}-${TYPE}.jar" >> "$GITHUB_ENV"
          echo "JAR_FILE=jars/${FOLDER}/${VERSION}-${TYPE}.jar" >> "$GITHUB_ENV"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download JAR
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p jars/${{ inputs.single_folder }}
          wget -q -O "${{ env.JAR_FILE }}" "${{ inputs.single_url }}"
          SIZE=$(stat -c%s "${{ env.JAR_FILE }}")
          [ "$SIZE" -lt 1000 ] && echo "вқҢ Too small" && exit 1

      - name: Commit JAR
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.JAR_FILE }}"
          git diff --cached --quiet || git commit -m "Add ${{ env.FILENAME }}"
          git push || true

      - name: Set labels
        if: steps.check.outputs.skip == 'false'
        run: |
          case "${{ env.JAR_TYPE }}" in
            alpha) LABEL="Alpha" ;; beta) LABEL="Beta" ;;
            snapshots) LABEL="Snapshot" ;; releases) LABEL="Release" ;;
            *) LABEL="Minecraft" ;;
          esac
          echo "RELEASE_LABEL=$LABEL" >> "$GITHUB_ENV"

      - name: Download Vineflower
        if: steps.check.outputs.skip == 'false'
        run: wget -q -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"

      - name: Decompile (Fast Mode)
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p output_src temp_classes
          unzip -q "${{ env.JAR_FILE }}" -d temp_classes
          java -jar vineflower.jar -j=4 -e=1 -dgs=1 -asc=1 -ind="    " temp_classes/ output_src/ 2>/dev/null || true
          unzip -q -o "${{ env.JAR_FILE }}" -x "*.class" -d output_src/ 2>/dev/null || true
          rm -rf temp_classes

      - name: Analyze & Package
        if: steps.check.outputs.skip == 'false'
        run: |
          TOTAL=$(find output_src -type f | wc -l)
          JAVA=$(find output_src -name "*.java" | wc -l)
          
          cd output_src && zip -qr "../${{ env.JAR_NAME }}-source.zip" . && cd ..
          cp "${{ env.JAR_FILE }}" "${{ env.JAR_NAME }}.jar"
          
          echo "TOTAL_FILES=$TOTAL" >> "$GITHUB_ENV"
          echo "JAVA_FILES=$JAVA" >> "$GITHUB_ENV"

      - name: Create Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.RELEASE_LABEL }}] ${{ env.VERSION }} (${{ env.CONTENT_TYPE }})"
          body: |
            ## Minecraft `${{ env.VERSION }}` вҖ” ${{ env.CONTENT_TYPE }} (${{ env.RELEASE_LABEL }})
            
            ### рҹ“Ҙ Downloads
            | File | Description |
            |------|-------------|
            | `${{ env.JAR_NAME }}-source.zip` | Decompiled source |
            | `${{ env.JAR_NAME }}.jar` | Original JAR |
            
            ### рҹ“Ҡ Stats
            - **Java Files:** ${{ env.JAVA_FILES }}
            - **Total Files:** ${{ env.TOTAL_FILES }}
            - **Decompiler:** Vineflower 1.12.0
          files: |
            ${{ env.JAR_NAME }}-source.zip
            ${{ env.JAR_NAME }}.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# SINGLE: EXISTING JAR
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  single-existing:
    name: "рҹ“Ӯ Release Existing JAR"
    needs: setup
    if: ${{ inputs.mode == 'рҹ“Ӯ Release Existing JAR (from repo)' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
