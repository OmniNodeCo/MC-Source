          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set labels
        if: steps.check.outputs.skip == 'false'
        run: |
          case "${{ env.JAR_TYPE }}" in
            alpha) LABEL="Alpha" ;; beta) LABEL="Beta" ;;
            snapshots) LABEL="Snapshot" ;; releases) LABEL="Release" ;;
            *) LABEL="Minecraft" ;;
          esac
          echo "RELEASE_LABEL=$LABEL" >> "$GITHUB_ENV"

      - name: Download Vineflower
        if: steps.check.outputs.skip == 'false'
        run: wget -q -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"

      - name: Decompile (Fast Mode)
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p output_src temp_classes
          unzip -q "${{ env.JAR_FILE }}" -d temp_classes
          java -jar vineflower.jar -j=4 -e=1 -dgs=1 -asc=1 -ind="    " temp_classes/ output_src/ 2>/dev/null || true
          unzip -q -o "${{ env.JAR_FILE }}" -x "*.class" -d output_src/ 2>/dev/null || true
          rm -rf temp_classes

      - name: Analyze & Package
        if: steps.check.outputs.skip == 'false'
        run: |
          TOTAL=$(find output_src -type f | wc -l)
          JAVA=$(find output_src -name "*.java" | wc -l)
          
          cd output_src && zip -qr "../${{ env.JAR_NAME }}-source.zip" . && cd ..
          cp "${{ env.JAR_FILE }}" "${{ env.JAR_NAME }}.jar"
          
          echo "TOTAL_FILES=$TOTAL" >> "$GITHUB_ENV"
          echo "JAVA_FILES=$JAVA" >> "$GITHUB_ENV"

      - name: Create Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.RELEASE_LABEL }}] ${{ env.VERSION }} (${{ env.CONTENT_TYPE }})"
          body: |
            ## Minecraft `${{ env.VERSION }}` вҖ” ${{ env.CONTENT_TYPE }} (${{ env.RELEASE_LABEL }})
            
            ### рҹ“Ҙ Downloads
            | File | Description |
            |------|-------------|
            | `${{ env.JAR_NAME }}-source.zip` | Decompiled source |
            | `${{ env.JAR_NAME }}.jar` | Original JAR |
            
            ### рҹ“Ҡ Stats
            - **Java Files:** ${{ env.JAVA_FILES }}
            - **Total Files:** ${{ env.TOTAL_FILES }}
            - **Decompiler:** Vineflower 1.12.0
          files: |
            ${{ env.JAR_NAME }}-source.zip
            ${{ env.JAR_NAME }}.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# BATCH: PARSE & SORT
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  batch-parse:
    name: "рҹ“Ӣ Parse & Sort"
    needs: setup
    if: ${{ inputs.mode == 'рҹ“Ӣ Batch Release (from link file)' }}
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.parse.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull

      - name: Parse and sort
        id: parse
        run: |
          FILE="links/${{ inputs.batch_file }}"

          if [ ! -f "$FILE" ]; then
            echo "вқҢ File not found: $FILE"
            exit 1
          fi

          case "${{ inputs.batch_file }}" in
            links_releases.md)  SECTION="releases" ;;
            links_snapshots.md) SECTION="snapshots" ;;
            links_beta.md)      SECTION="beta" ;;
            links_alpha.md)     SECTION="alpha" ;;
            *)                  SECTION="custom" ;;
          esac

          JAR_TYPE="${{ inputs.batch_jar_type }}"
          LIMIT="${{ inputs.batch_limit }}"

          # Parse link file
          VERSION=""
          CLIENT=""
          SERVER=""
          > unsorted.txt

          while IFS= read -r line || [ -n "$line" ]; do
            if echo "$line" | grep -qE '^### '; then
              if [ -n "$VERSION" ]; then
                if { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "client" ]; } && [ -n "$CLIENT" ]; then
                  echo "${VERSION}|${CLIENT}|${SECTION}|client" >> unsorted.txt
                fi
                if { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "server" ]; } && [ -n "$SERVER" ]; then
                  echo "${VERSION}|${SERVER}|${SECTION}|server" >> unsorted.txt
                fi
              fi
              VERSION=$(echo "$line" | sed 's/^### //')
              CLIENT=""
              SERVER=""
              continue
            fi
            if echo "$line" | grep -qiE '^\- *[Cc]lient'; then
              CLIENT=$(echo "$line" | grep -oP 'https?://[^\s\)]+')
            fi
            if echo "$line" | grep -qiE '^\- *[Ss]erver'; then
              SERVER=$(echo "$line" | grep -oP 'https?://[^\s\)]+')
            fi
          done < "$FILE"

          # Save last version
          if [ -n "$VERSION" ]; then
            if { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "client" ]; } && [ -n "$CLIENT" ]; then
              echo "${VERSION}|${CLIENT}|${SECTION}|client" >> unsorted.txt
            fi
            if { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "server" ]; } && [ -n "$SERVER" ]; then
              echo "${VERSION}|${SERVER}|${SECTION}|server" >> unsorted.txt
            fi
          fi

          # Get Mojang order (oldest first)
          curl -s "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json" > manifest.json
          jq -r '.versions | reverse | .[].id' manifest.json > mojang_order.txt

          # Sort by Mojang order
          > sorted.txt
          COUNT=0

          while IFS= read -r mc_version; do
            while IFS='|' read -r ver url sec typ; do
              if [ "$ver" = "$mc_version" ]; then
                if [ "$LIMIT" -eq 0 ] || [ "$COUNT" -lt "$LIMIT" ]; then
                  echo "${ver}|${url}|${sec}|${typ}" >> sorted.txt
                  COUNT=$((COUNT + 1))
                fi
              fi
            done < unsorted.txt
          done < mojang_order.txt

          # Add versions not in Mojang manifest
          while IFS='|' read -r ver url sec typ; do
            if ! grep -q "^${ver}|" sorted.txt 2>/dev/null; then
              if [ "$LIMIT" -eq 0 ] || [ "$COUNT" -lt "$LIMIT" ]; then
                echo "${ver}|${url}|${sec}|${typ}" >> sorted.txt
                COUNT=$((COUNT + 1))
              fi
            fi
          done < unsorted.txt

          TOTAL=$(wc -l < sorted.txt)
          echo "рҹ“Ӣ Found $TOTAL entries (oldest вҶ’ newest)"

          echo "count=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Upload sorted list
        uses: actions/upload-artifact@v4
        with:
          name: sorted-entries
          path: sorted.txt
          retention-days: 1

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# BATCH: PROCESS ALL VERSIONS
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  batch-process:
    name: "вҡҷпёҸ Process Versions"
    needs: batch-parse
    if: ${{ needs.batch-parse.outputs.count != '0' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download sorted list
        uses: actions/download-artifact@v4
        with:
          name: sorted-entries

      - name: Download Vineflower
        run: wget -q -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"

      - name: Process all versions in order
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(wc -l < sorted.txt)
          COUNT=0

          echo ""
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "вҡҷпёҸ PROCESSING $TOTAL VERSIONS (oldest вҶ’ newest)"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo ""

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS='|' read -r VERSION URL SECTION TYPE; do
            COUNT=$((COUNT + 1))

            JAR_NAME="${VERSION}-${TYPE}"
            FILENAME="${VERSION}-${TYPE}.jar"
            JAR_FILE="jars/${SECTION}/${FILENAME}"
            TAG="${SECTION}-${JAR_NAME}"

            echo ""
            echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
            echo "[$COUNT/$TOTAL] $VERSION ($TYPE)"
            echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"

            # Check if release exists
            if gh release view "$TAG" > /dev/null 2>&1; then
              echo "  вҸӯпёҸ Skipping вҖ” release exists"
              continue
            fi

            # Download JAR
            echo "  рҹ“Ҙ Downloading..."
            mkdir -p "jars/${SECTION}"
            wget -q -O "$JAR_FILE" "$URL" || { echo "  вқҢ Download failed"; continue; }

            SIZE=$(stat -c%s "$JAR_FILE")
            [ "$SIZE" -lt 1000 ] && { echo "  вқҢ Too small"; rm -f "$JAR_FILE"; continue; }

            # Commit JAR
            echo "  рҹ’ҫ Committing..."
            git pull --rebase || true
            git add "$JAR_FILE"
            git diff --cached --quiet || git commit -m "Add $FILENAME"
            git push || true

            # Decompile (Fast Mode)
            echo "  рҹ”§ Decompiling..."
            rm -rf output_src temp_classes
            mkdir -p output_src temp_classes

            unzip -q "$JAR_FILE" -d temp_classes 2>/dev/null || true
            java -jar vineflower.jar -j=4 -e=1 -dgs=1 -asc=1 -ind="    " temp_classes/ output_src/ 2>/dev/null || true
            unzip -q -o "$JAR_FILE" -x "*.class" -d output_src/ 2>/dev/null || true
            rm -rf temp_classes

            # Stats
            TOTAL_FILES=$(find output_src -type f | wc -l)
            JAVA_FILES=$(find output_src -name "*.java" | wc -l)

            # Set label
            case "$SECTION" in
              alpha) LABEL="Alpha" ;; beta) LABEL="Beta" ;;
              snapshots) LABEL="Snapshot" ;; releases) LABEL="Release" ;;
              *) LABEL="Minecraft" ;;
            esac

            # Package
            echo "  рҹ“Ұ Packaging..."
            cd output_src && zip -qr "../${JAR_NAME}-source.zip" . && cd ..
            cp "$JAR_FILE" "${JAR_NAME}.jar"

            # Create release
            echo "  рҹҡҖ Releasing..."

            BODY="## Minecraft \`$VERSION\` вҖ” $TYPE ($LABEL)

          ### рҹ“Ҙ Downloads
          | File | Description |
          |------|-------------|
          | \`${JAR_NAME}-source.zip\` | Decompiled source |
          | \`${JAR_NAME}.jar\` | Original JAR |

          ### рҹ“Ҡ Stats
          - **Java Files:** $JAVA_FILES
          - **Total Files:** $TOTAL_FILES
          - **Decompiler:** Vineflower 1.12.0"

            gh release create "$TAG" \
              --title "[$LABEL] $VERSION ($TYPE)" \
              --notes "$BODY" \
              "${JAR_NAME}-source.zip" \
              "${JAR_NAME}.jar"

            echo "  вң… Done!"

            # Cleanup
            rm -rf output_src "${JAR_NAME}-source.zip" "${JAR_NAME}.jar"

            # Small delay for ordering
            sleep 1

          done < sorted.txt

          echo ""
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "вң… DONE! $COUNT versions processed"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
