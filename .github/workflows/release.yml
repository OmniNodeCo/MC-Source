name: 📦 Minecraft Source Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔧 Mode'
        required: true
        type: choice
        options:
          - '📥 Download & Release (from URL)'
          - '📂 Release Existing JAR (from repo)'
          - '📋 Batch Release (from link file)'

      # ── SINGLE MODE OPTIONS ──
      single_url:
        description: '🔗 [Single] Download URL'
        required: false
        type: string
        default: ''
      single_folder:
        description: '📁 [Single] Category'
        required: false
        type: choice
        options:
          - releases
          - snapshots
          - beta
          - alpha
      single_version:
        description: '🏷️ [Single] Version Name (e.g. 26.2)'
        required: false
        type: string
        default: ''
      single_jar_type:
        description: '☕ [Single] JAR Type'
        required: false
        type: choice
        options:
          - client
          - server
      single_changelog:
        description: '📝 [Single] Changelog URL (optional)'
        required: false
        type: string
        default: ''

      # ── BATCH MODE OPTIONS ──
      batch_file:
        description: '📄 [Batch] Link File'
        required: false
        type: choice
        options:
          - links_releases.md
          - links_snapshots.md
          - links_beta.md
          - links_alpha.md
          - links_custom.md
      batch_jar_type:
        description: '☕ [Batch] JAR Type'
        required: false
        type: choice
        options:
          - both
          - client
          - server
      batch_limit:
        description: '🔢 [Batch] Max Versions (0 = all)'
        required: false
        type: number
        default: 0

# ════════════════════════════════════════════════
# SETUP: CREATE MANIFEST
# ════════════════════════════════════════════════
jobs:
  setup:
    name: "🔧 Setup"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create manifest if missing
        run: |
          MANIFEST="manifest.json"

          if [ ! -f "$MANIFEST" ]; then
            echo "📝 Creating manifest.json..."

            cat > "$MANIFEST" << 'EOF'
          {
            "project": "MC-Source",
            "description": "Decompiled Minecraft Source Code",
            "decompiler": "Vineflower 1.12.0",
            "categories": ["releases", "snapshots", "beta", "alpha"],
            "processed": []
          }
          EOF
          fi

      - name: Ensure folders exist
        run: |
          mkdir -p jars/alpha jars/beta jars/snapshots jars/releases
          mkdir -p links

          for DIR in jars/alpha jars/beta jars/snapshots jars/releases links; do
            if [ ! "$(ls -A $DIR 2>/dev/null)" ]; then
              touch "$DIR/.gitkeep"
            fi
          done

      - name: Commit setup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet || git commit -m "🔧 Setup"
          git push || true

# ════════════════════════════════════════════════
# SINGLE: DOWNLOAD & RELEASE
# ════════════════════════════════════════════════
  single-download:
    name: "📥 Download & Release"
    needs: setup
    if: ${{ inputs.mode == '📥 Download & Release (from URL)' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.single_url }}" ]; then
            echo "❌ No download URL provided"
            exit 1
          fi
          if [ -z "${{ inputs.single_version }}" ]; then
            echo "❌ No version name provided"
            exit 1
          fi

      - name: Setup variables
        run: |
          VERSION=$(echo "${{ inputs.single_version }}" | sed 's/\.jar$//')
          TYPE="${{ inputs.single_jar_type }}"
          FOLDER="${{ inputs.single_folder }}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CONTENT_TYPE=$TYPE" >> "$GITHUB_ENV"
          echo "JAR_TYPE=$FOLDER" >> "$GITHUB_ENV"
          echo "JAR_NAME=${VERSION}-${TYPE}" >> "$GITHUB_ENV"
          echo "FILENAME=${VERSION}-${TYPE}.jar" >> "$GITHUB_ENV"
          echo "JAR_FILE=jars/${FOLDER}/${VERSION}-${TYPE}.jar" >> "$GITHUB_ENV"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "⏭️ Release $TAG already exists"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download JAR
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p jars/${{ inputs.single_folder }}
          wget -O "${{ env.JAR_FILE }}" "${{ inputs.single_url }}"

          SIZE=$(stat -c%s "${{ env.JAR_FILE }}")
          echo "✅ Downloaded: ${{ env.JAR_FILE }} ($SIZE bytes)"

          if [ "$SIZE" -lt 1000 ]; then
            echo "❌ File too small"
            exit 1
          fi

      - name: Commit JAR
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.JAR_FILE }}"
          git diff --cached --quiet || git commit -m "Add ${{ env.FILENAME }}"
          git push || true

      - name: Set labels
        if: steps.check.outputs.skip == 'false'
        run: |
          case "${{ env.JAR_TYPE }}" in
            alpha)     LABEL="Alpha" ;;
            beta)      LABEL="Beta" ;;
            snapshots) LABEL="Snapshot" ;;
            releases)  LABEL="Release" ;;
            *)         LABEL="Minecraft" ;;
          esac
          echo "RELEASE_LABEL=$LABEL" >> "$GITHUB_ENV"

          URL="${{ inputs.single_changelog }}"
          if [ -n "$URL" ]; then
            echo "CHANGELOG=- **Changelog:** [View Changelog]($URL)" >> "$GITHUB_ENV"
          else
            echo "CHANGELOG=" >> "$GITHUB_ENV"
          fi

      - name: Download Vineflower
        if: steps.check.outputs.skip == 'false'
        run: wget -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"

      - name: Decompile
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p output_src
          java -jar vineflower.jar -j=2 -e=1 -dgs=1 -asc=1 -ind="    " "${{ env.JAR_FILE }}" output_src/

      - name: Analyze files
        if: steps.check.outputs.skip == 'false'
        run: |
          TOTAL=$(find output_src -type f | wc -l)
          JAVA=$(find output_src -name "*.java" | wc -l)
          JSON=$(find output_src \( -name "*.json" -o -name "*.mcmeta" \) | wc -l)
          PNG=$(find output_src -name "*.png" | wc -l)
          OGG=$(find output_src -name "*.ogg" | wc -l)
          OTHER=$((TOTAL - JAVA - JSON - PNG - OGG))

          {
            echo "LANG_STATS<<EOF"
            echo "| Type | Files | % |"
            echo "|------|-------|---|"
            for PAIR in "Java:$JAVA" "JSON:$JSON" "PNG:$PNG" "OGG:$OGG" "Other:$OTHER"; do
              NAME="${PAIR%%:*}"; NUM="${PAIR##*:}"
              if [ "$NUM" -gt 0 ] && [ "$TOTAL" -gt 0 ]; then
                PCT=$(awk "BEGIN {printf \"%.1f\", ($NUM/$TOTAL)*100}")
                echo "| $NAME | $NUM | $PCT% |"
              fi
            done
            echo "**Total:** $TOTAL files"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Package
        if: steps.check.outputs.skip == 'false'
        run: |
          cd output_src && zip -r "../${{ env.JAR_NAME }}-source.zip" . && cd ..
          cp "${{ env.JAR_FILE }}" "${{ env.JAR_NAME }}.jar"

      - name: Create Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.RELEASE_LABEL }}] ${{ env.VERSION }} (${{ env.CONTENT_TYPE }})"
          body: |
            ## Minecraft `${{ env.VERSION }}` — ${{ env.CONTENT_TYPE }} (${{ env.RELEASE_LABEL }})

            ### 📥 Downloads
            | File | Description |
            |------|-------------|
            | `${{ env.JAR_NAME }}-source.zip` | Decompiled Java source |
            | `${{ env.JAR_NAME }}.jar` | Original ${{ env.CONTENT_TYPE }} JAR |

            ### 📊 File Breakdown
            ${{ env.LANG_STATS }}

            ### ℹ️ Info
            - **Version:** ${{ env.VERSION }}
            - **Type:** ${{ env.CONTENT_TYPE }}
            - **Classification:** ${{ env.RELEASE_LABEL }}
            - **Decompiler:** Vineflower 1.12.0
            ${{ env.CHANGELOG }}
          files: |
            ${{ env.JAR_NAME }}-source.zip
            ${{ env.JAR_NAME }}.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ════════════════════════════════════════════════
# SINGLE: RELEASE EXISTING JAR
# ════════════════════════════════════════════════
  single-existing:
