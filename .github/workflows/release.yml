# ════════════════════════════════════════════════
# BATCH: PARSE LINK FILE
# ════════════════════════════════════════════════
  batch-parse:
    name: "📋 Parse Link File"
    if: ${{ inputs.mode == '📋 Batch Release (from link file)' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse link file
        id: parse
        run: |
          FILE="links/${{ inputs.batch_file }}"

          if [ ! -f "$FILE" ]; then
            echo "❌ File not found: $FILE"
            echo ""
            echo "Available files:"
            ls links/ 2>/dev/null || echo "  No links folder found"
            exit 1
          fi

          # Determine section from filename
          case "${{ inputs.batch_file }}" in
            links_releases.md)  SECTION="releases" ;;
            links_snapshots.md) SECTION="snapshots" ;;
            links_beta.md)      SECTION="beta" ;;
            links_alpha.md)     SECTION="alpha" ;;
            *)                  SECTION="custom" ;;
          esac

          JAR_TYPE="${{ inputs.batch_jar_type }}"
          LIMIT="${{ inputs.batch_limit }}"

          VERSION=""
          CLIENT=""
          SERVER=""
          ENTRIES="[]"
          COUNT=0

          save_version() {
            if [ -n "$VERSION" ]; then
              if [ "$LIMIT" -eq 0 ] || [ "$COUNT" -lt "$LIMIT" ]; then
                if { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "client" ]; } && [ -n "$CLIENT" ]; then
                  ENTRIES=$(echo "$ENTRIES" | jq --arg v "$VERSION" --arg u "$CLIENT" --arg s "$SECTION" --arg t "client" '. += [{"version": $v, "url": $u, "section": $s, "type": $t}]')
                  COUNT=$((COUNT + 1))
                fi
                if { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "server" ]; } && [ -n "$SERVER" ]; then
                  ENTRIES=$(echo "$ENTRIES" | jq --arg v "$VERSION" --arg u "$SERVER" --arg s "$SECTION" --arg t "server" '. += [{"version": $v, "url": $u, "section": $s, "type": $t}]')
                  COUNT=$((COUNT + 1))
                fi
              fi
            fi
          }

          while IFS= read -r line || [ -n "$line" ]; do
            if echo "$line" | grep -qE '^### '; then
              save_version
              VERSION=$(echo "$line" | sed 's/^### //')
              CLIENT=""
              SERVER=""
              continue
            fi
            if echo "$line" | grep -qiE '^\- *[Cc]lient'; then
              CLIENT=$(echo "$line" | grep -oP 'https?://[^\s\)]+')
              continue
            fi
            if echo "$line" | grep -qiE '^\- *[Ss]erver'; then
              SERVER=$(echo "$line" | grep -oP 'https?://[^\s\)]+')
              continue
            fi
          done < "$FILE"

          save_version

          TOTAL=$(echo "$ENTRIES" | jq 'length')
          echo "📋 Found $TOTAL entries to process"

          echo "matrix=$(echo "$ENTRIES" | jq -c '{"include": .}')" >> "$GITHUB_OUTPUT"

# ════════════════════════════════════════════════
# BATCH: PROCESS EACH VERSION
# ════════════════════════════════════════════════
  batch-process:
    name: "⚙️ ${{ matrix.version }} (${{ matrix.type }})"
    needs: batch-parse
    if: ${{ fromJson(needs.batch-parse.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.batch-parse.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup
        run: |
          mkdir -p jars/${{ matrix.section }}

          VERSION="${{ matrix.version }}"
          TYPE="${{ matrix.type }}"
          SECTION="${{ matrix.section }}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CONTENT_TYPE=$TYPE" >> "$GITHUB_ENV"
          echo "JAR_TYPE=$SECTION" >> "$GITHUB_ENV"
          echo "JAR_NAME=${VERSION}-${TYPE}" >> "$GITHUB_ENV"
          echo "FILENAME=${VERSION}-${TYPE}.jar" >> "$GITHUB_ENV"
          echo "JAR_FILE=jars/${SECTION}/${VERSION}-${TYPE}.jar" >> "$GITHUB_ENV"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "⏭️ Skipping $TAG — already exists"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download JAR
        if: steps.check.outputs.skip == 'false'
        run: |
          wget -O "${{ env.JAR_FILE }}" "${{ matrix.url }}"

          SIZE=$(stat -c%s "${{ env.JAR_FILE }}")
          echo "✅ Downloaded: ${{ env.JAR_FILE }} ($SIZE bytes)"

          if [ "$SIZE" -lt 1000 ]; then
            echo "❌ File too small"
            exit 1
          fi

      - name: Commit JAR
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add "${{ env.JAR_FILE }}"
          git diff --cached --quiet || git commit -m "Add ${{ env.FILENAME }}"
          git push || true

      - name: Download Vineflower
        if: steps.check.outputs.skip == 'false'
        run: wget -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"

      - name: Decompile
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p output_src
          java -jar vineflower.jar -j=2 -e=1 -dgs=1 -asc=1 -ind="    " "${{ env.JAR_FILE }}" output_src/

      - name: Analyze files
        if: steps.check.outputs.skip == 'false'
        run: |
          TOTAL=$(find output_src -type f | wc -l)
          JAVA=$(find output_src -name "*.java" | wc -l)
          JSON=$(find output_src \( -name "*.json" -o -name "*.mcmeta" \) | wc -l)
          PNG=$(find output_src -name "*.png" | wc -l)
          OGG=$(find output_src -name "*.ogg" | wc -l)
          GLSL=$(find output_src \( -name "*.fsh" -o -name "*.vsh" -o -name "*.glsl" \) | wc -l)
          PROPS=$(find output_src -name "*.properties" | wc -l)
          OTHER=$((TOTAL - JAVA - JSON - PNG - OGG - GLSL - PROPS))

          {
            echo "LANG_STATS<<EOF"
            echo "| Type | Files | % |"
            echo "|------|-------|---|"
            for PAIR in "Java:$JAVA" "JSON:$JSON" "PNG:$PNG" "OGG:$OGG" "GLSL:$GLSL" "Properties:$PROPS" "Other:$OTHER"; do
              NAME="${PAIR%%:*}"; NUM="${PAIR##*:}"
              if [ "$NUM" -gt 0 ] && [ "$TOTAL" -gt 0 ]; then
                PCT=$(awk "BEGIN {printf \"%.1f\", ($NUM/$TOTAL)*100}")
                echo "| $NAME | $NUM | $PCT% |"
              fi
            done
            echo ""
            echo "**Total:** $TOTAL files"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Package
        if: steps.check.outputs.skip == 'false'
        run: |
          cd output_src && zip -r "../${{ env.JAR_NAME }}-source.zip" . && cd ..
          cp "${{ env.JAR_FILE }}" "${{ env.JAR_NAME }}.jar"

      - name: Set Release Label
        if: steps.check.outputs.skip == 'false'
        run: |
          case "${{ env.JAR_TYPE }}" in
            alpha)     LABEL="Alpha" ;;
            beta)      LABEL="Beta" ;;
            snapshots) LABEL="Snapshot" ;;
            releases)  LABEL="Release" ;;
            *)         LABEL="Minecraft" ;;
          esac
          echo "RELEASE_LABEL=$LABEL" >> "$GITHUB_ENV"

      - name: Create Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.RELEASE_LABEL }}] ${{ env.VERSION }} (${{ env.CONTENT_TYPE }})"
          body: |
            ## Minecraft `${{ env.VERSION }}` — ${{ env.CONTENT_TYPE }} (${{ env.RELEASE_LABEL }})

            ### 📥 Downloads
            | File | Description |
            |------|-------------|
            | `${{ env.JAR_NAME }}-source.zip` | Decompiled Java source |
            | `${{ env.JAR_NAME }}.jar` | Original ${{ env.CONTENT_TYPE }} JAR |

            ### 📊 File Breakdown
            ${{ env.LANG_STATS }}

            ### ℹ️ Info
            - **Version:** ${{ env.VERSION }}
            - **Type:** ${{ env.CONTENT_TYPE }}
            - **Classification:** ${{ env.RELEASE_LABEL }}
            - **Decompiler:** Vineflower 1.12.0
          files: |
            ${{ env.JAR_NAME }}-source.zip
            ${{ env.JAR_NAME }}.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
