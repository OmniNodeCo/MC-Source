            snapshots) L="Snapshot";; releases) L="Release";; *) L="Minecraft";;
          esac
          echo "LABEL=$L" >> "$GITHUB_ENV"
      - name: Vineflower
        if: steps.check.outputs.skip == 'false'
        run: wget -q -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"
      - name: Decompile
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p output_src temp_classes
          unzip -q "${{ env.JAR_FILE }}" -d temp_classes
          java -jar vineflower.jar -j=4 -e=1 -dgs=1 -asc=1 -ind="    " temp_classes/ output_src/ 2>/dev/null || true
          unzip -q -o "${{ env.JAR_FILE }}" -x "*.class" -d output_src/ 2>/dev/null || true
          rm -rf temp_classes
      - name: Package
        if: steps.check.outputs.skip == 'false'
        run: |
          TOTAL=$(find output_src -type f | wc -l)
          JAVA=$(find output_src -name "*.java" | wc -l)
          cd output_src && zip -qr "../${{ env.JAR_NAME }}-source.zip" . && cd ..
          cp "${{ env.JAR_FILE }}" "${{ env.JAR_NAME }}.jar"
          echo "TOTAL=$TOTAL" >> "$GITHUB_ENV"
          echo "JAVA=$JAVA" >> "$GITHUB_ENV"
      - name: Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.LABEL }}] ${{ env.VERSION }} (${{ env.CONTENT_TYPE }})"
          body: |
            ## Minecraft `${{ env.VERSION }}` вҖ” ${{ env.CONTENT_TYPE }} (${{ env.LABEL }})
            ### рҹ“Ҙ Downloads
            | File | Description |
            |------|-------------|
            | `${{ env.JAR_NAME }}-source.zip` | Decompiled source |
            | `${{ env.JAR_NAME }}.jar` | Original JAR |
            ### рҹ“Ҡ Stats
            - Java: ${{ env.JAVA }} files
            - Total: ${{ env.TOTAL }} files
          files: |
            ${{ env.JAR_NAME }}-source.zip
            ${{ env.JAR_NAME }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# BATCH: PARSE & FILTER
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  batch-parse:
    name: "рҹ“Ӣ Parse & Filter"
    needs: setup
    if: ${{ inputs.mode == 'рҹ“Ӣ Batch Release (from link file)' }}
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.parse.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull
        run: git pull

      - name: Parse and filter
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="links/${{ inputs.batch_file }}"
          [ ! -f "$FILE" ] && echo "вқҢ Not found: $FILE" && exit 1

          case "${{ inputs.batch_file }}" in
            links_releases.md)  SEC="releases" ;;
            links_snapshots.md) SEC="snapshots" ;;
            links_beta.md)      SEC="beta" ;;
            links_alpha.md)     SEC="alpha" ;;
            *)                  SEC="custom" ;;
          esac

          JAR_TYPE="${{ inputs.batch_jar_type }}"

          # Parse
          VER="" CL="" SV=""
          > raw.txt

          while IFS= read -r line || [ -n "$line" ]; do
            if echo "$line" | grep -qE '^### '; then
              [ -n "$VER" ] && {
                { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "client" ]; } && [ -n "$CL" ] && echo "$VER|$CL|$SEC|client" >> raw.txt
                { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "server" ]; } && [ -n "$SV" ] && echo "$VER|$SV|$SEC|server" >> raw.txt
              }
              VER=$(echo "$line" | sed 's/^### //')
              CL="" SV=""
              continue
            fi
            echo "$line" | grep -qiE '^\- *[Cc]lient' && CL=$(echo "$line" | grep -oP 'https?://[^\s\)]+')
            echo "$line" | grep -qiE '^\- *[Ss]erver' && SV=$(echo "$line" | grep -oP 'https?://[^\s\)]+')
          done < "$FILE"

          [ -n "$VER" ] && {
            { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "client" ]; } && [ -n "$CL" ] && echo "$VER|$CL|$SEC|client" >> raw.txt
            { [ "$JAR_TYPE" = "both" ] || [ "$JAR_TYPE" = "server" ]; } && [ -n "$SV" ] && echo "$VER|$SV|$SEC|server" >> raw.txt
          }

          TOTAL_RAW=$(wc -l < raw.txt)

          # Mojang order (oldest first)
          curl -s "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json" > mf.json
          jq -r '.versions | reverse | .[].id' mf.json > order.txt

          > sorted.txt
          while IFS= read -r mc; do
            grep "^${mc}|" raw.txt >> sorted.txt 2>/dev/null || true
          done < order.txt

          # Add missing
          while IFS='|' read -r v u s t; do
            grep -q "^${v}|.*|.*|${t}$" sorted.txt || echo "$v|$u|$s|$t" >> sorted.txt
          done < raw.txt

          # Get existing releases
          gh release list --limit 1000 --json tagName -q '.[].tagName' > existing.txt

          # Filter out done
          > todo.txt
          DONE=0
          while IFS='|' read -r v u s t; do
            TAG="${s}-${v}-${t}"
            if grep -q "^${TAG}$" existing.txt 2>/dev/null; then
              DONE=$((DONE + 1))
            else
              echo "$v|$u|$s|$t" >> todo.txt
            fi
          done < sorted.txt

          TODO=$(wc -l < todo.txt)

          echo ""
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "рҹ“Ҡ STATUS"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "  рҹ“Ӣ Total:    $TOTAL_RAW"
          echo "  вң… Done:     $DONE"
          echo "  рҹ“Ұ To do:    $TODO"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"

          if [ "$TODO" -eq 0 ]; then
            echo "рҹҺү All done!"
            echo "count=0" >> "$GITHUB_OUTPUT"
            touch sorted.txt
          else
            cp todo.txt sorted.txt
            echo "count=$TODO" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sorted-entries
          path: sorted.txt
          retention-days: 1

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# BATCH: PROCESS
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  batch-process:
    name: "вҡҷпёҸ Process"
    needs: batch-parse
    if: ${{ needs.batch-parse.outputs.count != '0' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull
        run: git pull

      - name: JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download list
        uses: actions/download-artifact@v4
        with:
          name: sorted-entries

      - name: Vineflower
        run: wget -q -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"

      - name: Process
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(wc -l < sorted.txt)
          COUNT=0
          DONE=0
          FAIL=0
          START=$(date +%s)
          MAX=19800  # 5.5 hours

          echo ""
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "вҡҷпёҸ PROCESSING $TOTAL VERSIONS"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS='|' read -r VER URL SEC TYP; do
            COUNT=$((COUNT + 1))

            # Time check
            [ $(( $(date +%s) - START )) -ge $MAX ] && echo "вҸұпёҸ Time limit" && break

            JAR_NAME="${VER}-${TYP}"
            JAR_FILE="jars/${SEC}/${VER}-${TYP}.jar"
            TAG="${SEC}-${JAR_NAME}"

            echo ""
            echo "[$COUNT/$TOTAL] $VER ($TYP)"

            # Skip if exists (double check)
            if gh release view "$TAG" > /dev/null 2>&1; then
              echo "  вҸӯпёҸ Skip"
              continue
            fi

            # Download
            mkdir -p "jars/${SEC}"
            if ! wget -q -O "$JAR_FILE" "$URL" 2>/dev/null; then
              echo "  вқҢ Download fail"
              FAIL=$((FAIL + 1))
              continue
            fi

            SIZE=$(stat -c%s "$JAR_FILE" 2>/dev/null || echo 0)
            [ "$SIZE" -lt 1000 ] && echo "  вқҢ Too small" && FAIL=$((FAIL + 1)) && rm -f "$JAR_FILE" && continue

            # Commit
            git pull --rebase || true
            git add "$JAR_FILE"
            git diff --cached --quiet || git commit -m "Add ${VER}-${TYP}.jar"
            git push || true

            # Decompile
            rm -rf output_src temp_classes
            mkdir -p output_src temp_classes
            unzip -q "$JAR_FILE" -d temp_classes 2>/dev/null || true
            timeout 600 java -jar vineflower.jar -j=4 -e=1 -dgs=1 -asc=1 -ind="    " temp_classes/ output_src/ 2>/dev/null || true
            unzip -q -o "$JAR_FILE" -x "*.class" -d output_src/ 2>/dev/null || true
            rm -rf temp_classes

            # Stats
            TOTAL_F=$(find output_src -type f | wc -l)
            JAVA_F=$(find output_src -name "*.java" | wc -l)

            case "$SEC" in
              alpha) L="Alpha";; beta) L="Beta";;
              snapshots) L="Snapshot";; releases) L="Release";; *) L="Minecraft";;
            esac

            # Package
            cd output_src && zip -qr "../${JAR_NAME}-source.zip" . && cd ..
            cp "$JAR_FILE" "${JAR_NAME}.jar"

            # Release
            BODY="## Minecraft \`$VER\` вҖ” $TYP ($L)
          ### рҹ“Ҙ Downloads
          | File | Description |
          |------|-------------|
          | \`${JAR_NAME}-source.zip\` | Decompiled source |
          | \`${JAR_NAME}.jar\` | Original JAR |
          ### рҹ“Ҡ Stats
          - Java: $JAVA_F files
          - Total: $TOTAL_F files"

            if gh release create "$TAG" --title "[$L] $VER ($TYP)" --notes "$BODY" "${JAR_NAME}-source.zip" "${JAR_NAME}.jar" 2>/dev/null; then
              echo "  вң… Done"
              DONE=$((DONE + 1))
            else
              echo "  вқҢ Release fail"
              FAIL=$((FAIL + 1))
            fi

            rm -rf output_src "${JAR_NAME}-source.zip" "${JAR_NAME}.jar"
            sleep 1

          done < sorted.txt

          echo ""
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "рҹ“Ҡ RESULT"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "  вң… Done:   $DONE"
          echo "  вқҢ Failed: $FAIL"
          echo "  рҹ“Ӣ Total:  $COUNT / $TOTAL"
          echo ""
          echo "рҹ’Ў Run again to continue"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
