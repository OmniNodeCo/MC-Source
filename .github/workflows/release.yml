name: Decompile and Release

on:
  push:
    paths:
      - 'jars/alpha/*.jar'
      - 'jars/beta/*.jar'
      - 'jars/snapshots/*.jar'
      - 'jars/releases/*.jar'
  workflow_dispatch:
    inputs:
      jar_folder:
        description: 'Folder the JAR is in'
        required: true
        type: choice
        options:
          - alpha
          - beta
          - snapshots
          - releases
      jar_file:
        description: 'JAR filename (example: b1.7.3.jar)'
        required: true
        type: string

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ensure folders exist
        run: |
          mkdir -p jars/alpha jars/beta jars/snapshots jars/releases

      - name: Detect JAR
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FOLDER="${{ inputs.jar_folder }}"
            JAR_FILENAME="${{ inputs.jar_file }}"
            CHANGED_JAR="jars/$FOLDER/$JAR_FILENAME"
          else
            CHANGED_JAR=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -E '^jars/(alpha|beta|snapshots|releases)/.*\.jar$' | head -n 1)

            if [ -z "$CHANGED_JAR" ]; then
              CHANGED_JAR=$(find jars -name "*.jar" -printf "%T@ %p\n" | sort -n | tail -1 | cut -d' ' -f2-)
            fi

            FOLDER=$(echo "$CHANGED_JAR" | cut -d'/' -f2)
          fi

          JAR_NAME=$(basename "$CHANGED_JAR" .jar)

          echo "JAR_FILE=$CHANGED_JAR" >> "$GITHUB_ENV"
          echo "JAR_NAME=$JAR_NAME" >> "$GITHUB_ENV"
          echo "JAR_TYPE=$FOLDER" >> "$GITHUB_ENV"

          echo "Detected JAR: $CHANGED_JAR"
          echo "JAR Name: $JAR_NAME"
          echo "Folder: $FOLDER"

      - name: Validate JAR exists
        run: |
          if [ ! -f "${{ env.JAR_FILE }}" ]; then
            echo "JAR not found: ${{ env.JAR_FILE }}"
            exit 1
          fi

      - name: Set Release Label
        run: |
          case "${{ env.JAR_TYPE }}" in
            alpha)
              echo "RELEASE_LABEL=Alpha" >> "$GITHUB_ENV"
              echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
              ;;
            beta)
              echo "RELEASE_LABEL=Beta" >> "$GITHUB_ENV"
              echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
              ;;
            snapshots)
              echo "RELEASE_LABEL=Snapshot" >> "$GITHUB_ENV"
              echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
              ;;
            releases)
              echo "RELEASE_LABEL=Release" >> "$GITHUB_ENV"
              echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
              ;;
            *)
              echo "RELEASE_LABEL=Unknown" >> "$GITHUB_ENV"
              echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Download Vineflower
        run: |
          wget -O vineflower.jar "https://github.com/Vineflower/vineflower/releases/latest/download/vineflower.jar"

      - name: Decompile JAR
        run: |
          mkdir -p output_src
          java -jar vineflower.jar \
            -j=2 \
            -e \
            -dgs=1 \
            -asc=1 \
            -ind="    " \
            "${{ env.JAR_FILE }}" \
            output_src/

      - name: Zip Source Code
        run: |
          cd output_src
          zip -r "../${{ env.JAR_NAME }}-source.zip" .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.RELEASE_LABEL }}] ${{ env.JAR_NAME }}"
          body: |
            Decompiled source for `${{ env.JAR_NAME }}`

            - Type: ${{ env.RELEASE_LABEL }}
            - Source JAR: `jars/${{ env.JAR_TYPE }}/${{ env.JAR_NAME }}.jar`
          files: "${{ env.JAR_NAME }}-source.zip"
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}