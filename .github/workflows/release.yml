      - name: Download Vineflower
        run: wget -O vineflower.jar "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.12.0/vineflower-1.12.0.jar"

      - name: Decompile
        run: |
          mkdir -p output_src
          java -jar vineflower.jar -j=2 -e=1 -dgs=1 -asc=1 -ind="    " "${{ env.JAR_FILE }}" output_src/

      - name: Analyze files
        run: |
          TOTAL=$(find output_src -type f | wc -l)
          JAVA=$(find output_src -name "*.java" | wc -l)
          JSON=$(find output_src \( -name "*.json" -o -name "*.mcmeta" \) | wc -l)
          PNG=$(find output_src -name "*.png" | wc -l)
          OGG=$(find output_src -name "*.ogg" | wc -l)
          GLSL=$(find output_src \( -name "*.fsh" -o -name "*.vsh" -o -name "*.glsl" \) | wc -l)
          PROPS=$(find output_src -name "*.properties" | wc -l)
          OTHER=$((TOTAL - JAVA - JSON - PNG - OGG - GLSL - PROPS))

          {
            echo "LANG_STATS<<EOF"
            echo "| Type | Files | % |"
            echo "|------|-------|---|"
            for PAIR in "Java:$JAVA" "JSON:$JSON" "PNG:$PNG" "OGG:$OGG" "GLSL:$GLSL" "Properties:$PROPS" "Other:$OTHER"; do
              NAME="${PAIR%%:*}"; NUM="${PAIR##*:}"
              if [ "$NUM" -gt 0 ] && [ "$TOTAL" -gt 0 ]; then
                PCT=$(awk "BEGIN {printf \"%.1f\", ($NUM/$TOTAL)*100}")
                echo "| $NAME | $NUM | $PCT% |"
              fi
            done
            echo ""
            echo "**Total:** $TOTAL files"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Package
        run: |
          cd output_src && zip -r "../${{ env.JAR_NAME }}-source.zip" . && cd ..
          cp "${{ env.JAR_FILE }}" "${{ env.JAR_NAME }}.jar"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.JAR_TYPE }}-${{ env.JAR_NAME }}"
          name: "[${{ env.RELEASE_LABEL }}] ${{ env.VERSION }} (${{ env.CONTENT_TYPE }})"
          body: |
            ## Minecraft `${{ env.VERSION }}` — ${{ env.CONTENT_TYPE }} (${{ env.RELEASE_LABEL }})

            ### 📥 Downloads
            | File | Description |
            |------|-------------|
            | `${{ env.JAR_NAME }}-source.zip` | Decompiled Java source |
            | `${{ env.JAR_NAME }}.jar` | Original ${{ env.CONTENT_TYPE }} JAR |

            ### 📊 File Breakdown
            ${{ env.LANG_STATS }}

            ### ℹ️ Info
