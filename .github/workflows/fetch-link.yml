name: Fetch Version Links

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        type: choice
        options:
          - 'Custom versions'
          - 'All releases'
          - 'All snapshots'
          - 'All beta'
          - 'All alpha'
          - 'Everything (all categories)'
      versions:
        description: 'Custom: Versions (comma separated)'
        required: false
        type: string
        default: ''
      update_mode:
        description: 'Update mode'
        required: true
        type: choice
        options:
          - 'Replace file contents'
          - 'Append to existing'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create links folder
        run: mkdir -p links

      - name: Fetch manifest
        run: |
          echo "🔍 Fetching Mojang version manifest..."
          curl -s "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json" > manifest.json
          echo "✅ Manifest downloaded"

      - name: Determine versions to fetch
        id: versions
        run: |
          MODE="${{ inputs.mode }}"
          
          case "$MODE" in
            "All releases")
              VERSIONS=$(jq -r '.versions[] | select(.type == "release") | .id' manifest.json | tr '\n' ' ')
              CATEGORIES="releases"
              ;;
            "All snapshots")
              VERSIONS=$(jq -r '.versions[] | select(.type == "snapshot") | .id' manifest.json | tr '\n' ' ')
              CATEGORIES="snapshots"
              ;;
            "All beta")
              VERSIONS=$(jq -r '.versions[] | select(.type == "old_beta") | .id' manifest.json | tr '\n' ' ')
              CATEGORIES="beta"
              ;;
            "All alpha")
              VERSIONS=$(jq -r '.versions[] | select(.type == "old_alpha") | .id' manifest.json | tr '\n' ' ')
              CATEGORIES="alpha"
              ;;
            "Everything (all categories)")
              VERSIONS=$(jq -r '.versions[].id' manifest.json | tr '\n' ' ')
              CATEGORIES="releases snapshots beta alpha"
              ;;
            *)
              VERSIONS=$(echo "${{ inputs.versions }}" | tr ',' ' ' | tr -s ' ')
              CATEGORIES="custom"
              ;;
          esac
          
          echo "VERSIONS=$VERSIONS" >> "$GITHUB_ENV"
          echo "CATEGORIES=$CATEGORIES" >> "$GITHUB_ENV"
          
          COUNT=$(echo "$VERSIONS" | wc -w)
          echo "📋 Found $COUNT versions to fetch"

      - name: Initialize link files
        run: |
          UPDATE_MODE="${{ inputs.update_mode }}"
          CATEGORIES="${{ env.CATEGORIES }}"
          
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          init_file() {
            local FILE="$1"
            local TITLE="$2"
            
            if [ "$UPDATE_MODE" = "Replace file contents" ] || [ ! -f "$FILE" ]; then
              echo "# Minecraft $TITLE Version Links" > "$FILE"
              echo "" >> "$FILE"
              echo "Last updated: $TIMESTAMP" >> "$FILE"
              echo "" >> "$FILE"
              echo "---" >> "$FILE"
              echo "" >> "$FILE"
            fi
          }
          
          if [ "$CATEGORIES" = "custom" ]; then
            init_file "links/links_custom.md" "Custom"
          else
            for CAT in $CATEGORIES; do
              case "$CAT" in
                releases)  init_file "links/links_releases.md" "Release" ;;
                snapshots) init_file "links/links_snapshots.md" "Snapshot" ;;
                beta)      init_file "links/links_beta.md" "Beta" ;;
                alpha)     init_file "links/links_alpha.md" "Alpha" ;;
              esac
            done
          fi

      - name: Fetch all version links
        run: |
          VERSIONS="${{ env.VERSIONS }}"
          
          TOTAL=$(echo "$VERSIONS" | wc -w)
          COUNT=0
          
          echo ""
          echo "═══════════════════════════════════════════"
          echo "📋 FETCHING $TOTAL VERSIONS"
          echo "═══════════════════════════════════════════"
          echo ""
          
          for VERSION in $VERSIONS; do
            COUNT=$((COUNT + 1))
            echo "[$COUNT/$TOTAL] 🔍 $VERSION"
            
            # Get version URL from manifest
            VERSION_URL=$(jq -r --arg v "$VERSION" '.versions[] | select(.id == $v) | .url' manifest.json)
            
            if [ -z "$VERSION_URL" ] || [ "$VERSION_URL" = "null" ]; then
              echo "         ❌ Not found in manifest"
              continue
            fi
            
            # Fetch version data
            VERSION_DATA=$(curl -s "$VERSION_URL")
            
            CLIENT=$(echo "$VERSION_DATA" | jq -r '.downloads.client.url // empty')
            SERVER=$(echo "$VERSION_DATA" | jq -r '.downloads.server.url // empty')
            TYPE=$(echo "$VERSION_DATA" | jq -r '.type')
            RELEASE_TIME=$(echo "$VERSION_DATA" | jq -r '.releaseTime' | cut -d'T' -f1)
            
            echo "         ✅ $TYPE ($RELEASE_TIME)"
            
            # Determine which file to write to
            case "$TYPE" in
              release)   FILE="links/links_releases.md" ;;
              snapshot)  FILE="links/links_snapshots.md" ;;
              old_beta)  FILE="links/links_beta.md" ;;
              old_alpha) FILE="links/links_alpha.md" ;;
              *)         FILE="links/links_custom.md" ;;
            esac
            
            # For custom mode, always use custom file
            if [ "${{ env.CATEGORIES }}" = "custom" ]; then
              FILE="links/links_custom.md"
            fi
            
            # Write entry
            {
              echo "### $VERSION"
              echo "- Released: $RELEASE_TIME"
              if [ -n "$CLIENT" ]; then
                echo "- Client: $CLIENT"
              fi
              if [ -n "$SERVER" ]; then
                echo "- Server: $SERVER"
              fi
              echo ""
            } >> "$FILE"
            
            # Small delay
            sleep 0.05
          done
          
          echo ""
          echo "═══════════════════════════════════════════"
          echo "✅ DONE! Processed $COUNT versions"
          echo "═══════════════════════════════════════════"

      - name: Show file stats
        run: |
          echo ""
          echo "📊 File Statistics:"
          echo ""
          
          for FILE in links/links_*.md; do
            if [ -f "$FILE" ]; then
              LINES=$(wc -l < "$FILE")
              VERSIONS=$(grep -c "^### " "$FILE" || true)
              echo "  📄 $(basename $FILE): $VERSIONS versions ($LINES lines)"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add links/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update links - ${{ inputs.mode }}"
            git push
            echo "✅ Committed!"
          fi
