name: Fetch Version Links

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        type: choice
        options:
          - 'Custom versions'
          - 'All releases'
          - 'All snapshots'
          - 'All beta'
          - 'All alpha'
          - 'Everything'
      versions:
        description: 'Versions (only for Custom mode, comma separated)'
        required: false
        type: string
        default: ''
      auto_add:
        description: 'Automatically add to links.md?'
        required: true
        type: boolean
        default: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch manifest and get versions
        id: get_versions
        run: |
          echo "🔍 Fetching manifest..."
          MANIFEST=$(curl -s "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json")
          
          MODE="${{ inputs.mode }}"
          
          case "$MODE" in
            "All releases")
              VERSIONS=$(echo "$MANIFEST" | jq -r '.versions[] | select(.type == "release") | .id' | tr '\n' ' ')
              ;;
            "All snapshots")
              VERSIONS=$(echo "$MANIFEST" | jq -r '.versions[] | select(.type == "snapshot") | .id' | tr '\n' ' ')
              ;;
            "All beta")
              VERSIONS=$(echo "$MANIFEST" | jq -r '.versions[] | select(.type == "old_beta") | .id' | tr '\n' ' ')
              ;;
            "All alpha")
              VERSIONS=$(echo "$MANIFEST" | jq -r '.versions[] | select(.type == "old_alpha") | .id' | tr '\n' ' ')
              ;;
            "Everything")
              VERSIONS=$(echo "$MANIFEST" | jq -r '.versions[].id' | tr '\n' ' ')
              ;;
            *)
              VERSIONS=$(echo "${{ inputs.versions }}" | tr ',' ' ' | tr -s ' ')
              ;;
          esac
          
          echo "Found versions: $VERSIONS"
          echo "VERSIONS=$VERSIONS" >> "$GITHUB_ENV"
          
          # Save manifest for next step
          echo "$MANIFEST" > manifest.json

      - name: Fetch all version links
        run: |
          MANIFEST=$(cat manifest.json)
          VERSIONS="${{ env.VERSIONS }}"
          
          # Store results for links.md
          RELEASES_SECTION=""
          SNAPSHOTS_SECTION=""
          BETA_SECTION=""
          ALPHA_SECTION=""
          
          TOTAL=$(echo "$VERSIONS" | wc -w)
          COUNT=0
          
          echo ""
          echo "═══════════════════════════════════════════"
          echo "📋 FETCHING $TOTAL VERSIONS"
          echo "═══════════════════════════════════════════"
          echo ""
          
          for VERSION in $VERSIONS; do
            COUNT=$((COUNT + 1))
            echo "[$COUNT/$TOTAL] 🔍 $VERSION"
            
            # Find the version URL
            VERSION_URL=$(echo "$MANIFEST" | jq -r --arg v "$VERSION" '.versions[] | select(.id == $v) | .url')
            
            if [ -z "$VERSION_URL" ] || [ "$VERSION_URL" = "null" ]; then
              echo "         ❌ Not found!"
              continue
            fi
            
            # Get version details
            VERSION_DATA=$(curl -s "$VERSION_URL")
            
            CLIENT=$(echo "$VERSION_DATA" | jq -r '.downloads.client.url // empty')
            SERVER=$(echo "$VERSION_DATA" | jq -r '.downloads.server.url // empty')
            TYPE=$(echo "$VERSION_DATA" | jq -r '.type')
            
            echo "         ✅ $TYPE"
            
            # Build the entry
            ENTRY="### $VERSION"
            if [ -n "$CLIENT" ]; then
              ENTRY="$ENTRY
          - Client: $CLIENT"
            fi
            if [ -n "$SERVER" ]; then
              ENTRY="$ENTRY
          - Server: $SERVER"
            fi
            ENTRY="$ENTRY
          "
            
            # Sort into correct section
            case "$TYPE" in
              release)
                RELEASES_SECTION="$RELEASES_SECTION
          $ENTRY"
                ;;
              snapshot)
                SNAPSHOTS_SECTION="$SNAPSHOTS_SECTION
          $ENTRY"
                ;;
              old_beta)
                BETA_SECTION="$BETA_SECTION
          $ENTRY"
                ;;
              old_alpha)
                ALPHA_SECTION="$ALPHA_SECTION
          $ENTRY"
                ;;
            esac
            
            # Small delay to not hammer the API
            sleep 0.1
          done
          
          echo ""
          echo "═══════════════════════════════════════════"
          echo "✅ DONE! Processed $COUNT versions"
          echo "═══════════════════════════════════════════"
          
          # Save for next step
          {
            echo "RELEASES<<EOF"
            echo "$RELEASES_SECTION"
            echo "EOF"
            echo "SNAPSHOTS<<EOF"
            echo "$SNAPSHOTS_SECTION"
            echo "EOF"
            echo "BETA<<EOF"
            echo "$BETA_SECTION"
            echo "EOF"
            echo "ALPHA<<EOF"
            echo "$ALPHA_SECTION"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Update links.md
        if: inputs.auto_add == true
        run: |
          FILE="links.md"
          
          # Create fresh file
          echo "# Minecraft Version Links" > "$FILE"
          echo "" >> "$FILE"
          echo "Auto-generated list of all Minecraft versions with download links." >> "$FILE"
          echo "" >> "$FILE"
          
          if [ -n "$RELEASES" ]; then
            echo "## Releases" >> "$FILE"
            echo "$RELEASES" >> "$FILE"
          fi
          
          if [ -n "$SNAPSHOTS" ]; then
            echo "## Snapshots" >> "$FILE"
            echo "$SNAPSHOTS" >> "$FILE"
          fi
          
          if [ -n "$BETA" ]; then
            echo "## Beta" >> "$FILE"
            echo "$BETA" >> "$FILE"
          fi
          
          if [ -n "$ALPHA" ]; then
            echo "## Alpha" >> "$FILE"
            echo "$ALPHA" >> "$FILE"
          fi
          
          echo ""
          echo "📄 links.md updated!"
          wc -l "$FILE"

      - name: Commit changes
        if: inputs.auto_add == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add links.md
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update links.md - ${{ inputs.mode }}"
            git push
            echo "✅ Committed!"
          fi
