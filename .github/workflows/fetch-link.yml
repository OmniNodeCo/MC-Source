name: Fetch Version Links

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'Versions (comma or space separated, e.g. "1.21.3, 1.21.2, b1.8.1, a1.2.6")'
        required: true
        type: string
      auto_add:
        description: 'Automatically add to links.md?'
        required: true
        type: boolean
        default: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch all version links
        run: |
          # Clean input - replace commas with spaces, remove extra spaces
          INPUT="${{ inputs.versions }}"
          VERSIONS=$(echo "$INPUT" | tr ',' ' ' | tr -s ' ')
          
          echo "🔍 Fetching manifest..."
          MANIFEST=$(curl -s "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json")
          
          # Store results for links.md
          RELEASES_SECTION=""
          SNAPSHOTS_SECTION=""
          BETA_SECTION=""
          ALPHA_SECTION=""
          OTHER_SECTION=""
          
          echo ""
          echo "═══════════════════════════════════════════"
          echo "📋 RESULTS"
          echo "═══════════════════════════════════════════"
          echo ""
          
          for VERSION in $VERSIONS; do
            echo "🔍 Looking up: $VERSION"
            
            # Find the version URL
            VERSION_URL=$(echo "$MANIFEST" | jq -r --arg v "$VERSION" '.versions[] | select(.id == $v) | .url')
            
            if [ -z "$VERSION_URL" ] || [ "$VERSION_URL" = "null" ]; then
              echo "   ❌ Not found!"
              echo ""
              continue
            fi
            
            # Get version details
            VERSION_DATA=$(curl -s "$VERSION_URL")
            
            CLIENT=$(echo "$VERSION_DATA" | jq -r '.downloads.client.url // empty')
            SERVER=$(echo "$VERSION_DATA" | jq -r '.downloads.server.url // empty')
            TYPE=$(echo "$VERSION_DATA" | jq -r '.type')
            
            echo "   ✅ Found! Type: $TYPE"
            
            # Build the entry
            ENTRY="### $VERSION"
            if [ -n "$CLIENT" ]; then
              ENTRY="$ENTRY
          - Client: $CLIENT"
            fi
            if [ -n "$SERVER" ]; then
              ENTRY="$ENTRY
          - Server: $SERVER"
            fi
            ENTRY="$ENTRY
          "
            
            # Sort into correct section
            case "$TYPE" in
              release)
                RELEASES_SECTION="$RELEASES_SECTION
          $ENTRY"
                ;;
              snapshot)
                SNAPSHOTS_SECTION="$SNAPSHOTS_SECTION
          $ENTRY"
                ;;
              old_beta)
                BETA_SECTION="$BETA_SECTION
          $ENTRY"
                ;;
              old_alpha)
                ALPHA_SECTION="$ALPHA_SECTION
          $ENTRY"
                ;;
              *)
                OTHER_SECTION="$OTHER_SECTION
          $ENTRY"
                ;;
            esac
            
            echo ""
          done
          
          # Print everything
          echo "═══════════════════════════════════════════"
          echo "📋 COPY THIS TO links.md:"
          echo "═══════════════════════════════════════════"
          echo ""
          
          if [ -n "$RELEASES_SECTION" ]; then
            echo "## Releases"
            echo "$RELEASES_SECTION"
          fi
          
          if [ -n "$SNAPSHOTS_SECTION" ]; then
            echo "## Snapshots"
            echo "$SNAPSHOTS_SECTION"
          fi
          
          if [ -n "$BETA_SECTION" ]; then
            echo "## Beta"
            echo "$BETA_SECTION"
          fi
          
          if [ -n "$ALPHA_SECTION" ]; then
            echo "## Alpha"
            echo "$ALPHA_SECTION"
          fi
          
          if [ -n "$OTHER_SECTION" ]; then
            echo "## Other"
            echo "$OTHER_SECTION"
          fi
          
          # Save for next step
          {
            echo "RELEASES<<EOF"
            echo "$RELEASES_SECTION"
            echo "EOF"
            echo "SNAPSHOTS<<EOF"
            echo "$SNAPSHOTS_SECTION"
            echo "EOF"
            echo "BETA<<EOF"
            echo "$BETA_SECTION"
            echo "EOF"
            echo "ALPHA<<EOF"
            echo "$ALPHA_SECTION"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Add to links.md
        if: inputs.auto_add == true
        run: |
          FILE="links.md"
          
          # Create file if not exists
          if [ ! -f "$FILE" ]; then
            echo "# Minecraft Version Links" > "$FILE"
            echo "" >> "$FILE"
          fi
          
          # Function to add entries to a section
          add_to_section() {
            local SECTION_NAME="$1"
            local ENTRIES="$2"
            
            if [ -z "$ENTRIES" ]; then
              return
            fi
            
            # Check if section exists
            if grep -q "^## $SECTION_NAME" "$FILE"; then
              # Find line number of section
              LINE_NUM=$(grep -n "^## $SECTION_NAME" "$FILE" | cut -d: -f1)
              
              # Find next section or end of file
              NEXT_SECTION=$(tail -n +$((LINE_NUM + 1)) "$FILE" | grep -n "^## " | head -1 | cut -d: -f1)
              
              if [ -n "$NEXT_SECTION" ]; then
                INSERT_LINE=$((LINE_NUM + NEXT_SECTION - 1))
              else
                INSERT_LINE=$(wc -l < "$FILE")
              fi
              
              # Insert entries
              head -n "$INSERT_LINE" "$FILE" > temp.md
              echo "$ENTRIES" >> temp.md
              tail -n +$((INSERT_LINE + 1)) "$FILE" >> temp.md
              mv temp.md "$FILE"
            else
              # Add new section at end
              echo "" >> "$FILE"
              echo "## $SECTION_NAME" >> "$FILE"
              echo "$ENTRIES" >> "$FILE"
            fi
          }
          
          add_to_section "Releases" "$RELEASES"
          add_to_section "Snapshots" "$SNAPSHOTS"
          add_to_section "Beta" "$BETA"
          add_to_section "Alpha" "$ALPHA"
          
          echo "📄 Updated links.md:"
          echo ""
          cat "$FILE"

      - name: Commit changes
        if: inputs.auto_add == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add links.md
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add versions: ${{ inputs.versions }}"
            git push
            echo "✅ Committed to links.md"
          fi
