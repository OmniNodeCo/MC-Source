name: Decompile JAR

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g., 26.2 or 1.21.3)'
        required: true
        type: string
      jar_url:
        description: 'Direct download URL to the JAR file'
        required: true
        type: string

jobs:
  decompile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download JAR
        run: |
          wget -O input.jar "${{ inputs.jar_url }}"

      - name: Download Decompiler (VineFlower)
        run: |
          wget -O vineflower.jar "https://github.com/Vineflower/vineflower/releases/latest/download/vineflower.jar"

      - name: Decompile
        run: |
          mkdir -p decompiled
          java -jar vineflower.jar \
            -j=2 \
            -e \
            -dgs=1 \
            -asc=1 \
            -ind="    " \
            input.jar \
            decompiled/

      - name: Prepare Project Structure
        run: |
          # Clean old source but keep .git
          rm -rf src build.gradle.kts settings.gradle.kts
          
          mkdir -p src/main/java
          # Copy only java files/folders from decompiled output
          cp -r decompiled/* src/main/java/
          
          # Generate Gradle files using the dynamic version name
          cat > build.gradle.kts << EOF
          plugins {
              id("java")
          }
          java {
              toolchain.languageVersion.set(JavaLanguageVersion.of(21))
          }
          group = "com.decompile"
          version = "${{ inputs.version_name }}"
          repositories {
              mavenCentral()
          }
          EOF

          cat > settings.gradle.kts << EOF
          rootProject.name = "project-${{ inputs.version_name }}"
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Only commit if there are actual code changes
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "Decompiled version: ${{ inputs.version_name }}"
            git push
          fi
